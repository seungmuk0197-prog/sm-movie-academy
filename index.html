<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM무비 아카데미 | 전략적 저작권 진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700;900&family=Nanum+Myeongjo:wght@700;800&family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#000000', gold: '#D4AF37', card: '#111111', safe: '#22C55E', caution: '#EAB308', danger: '#EF4444' },
                    fontFamily: { serif: ['"Nanum Myeongjo"', 'serif'], sans: ['Pretendard', 'Urbanist', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #daffde; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .gold-gradient-text { background: linear-gradient(135deg, #fff 0%, #D4AF37 50%, #aa841b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(255,255,255,0.05); }
        .movie-card:hover { transform: translateY(-10px); border-color: #D4AF37; box-shadow: 0 20px 40px rgba(0,0,0,1); }
        .page-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; background: #111; color: #666; border: 1px solid #222; }
        .page-btn.active { background: #D4AF37; color: #000; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        #detail-panel { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        #detail-backdrop { transition: opacity 0.4s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        .subscriber-tag { color: #D4AF37; font-weight: 900; font-size: 14px; letter-spacing: -0.02em; }
        .action-button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #ddd; transition: all 0.2s; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
        .action-button:hover { background: #EF4444; border-color: #EF4444; color: #fff; transform: scale(1.05); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .consulting-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="antialiased">
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-black">
        <div class="relative z-10 w-full max-w-xl p-16 bg-black/70 border border-white/10 rounded-[40px] shadow-2xl text-center backdrop-blur-2xl">
            <h1 class="text-6xl font-serif font-black leading-tight mb-10 gold-gradient-text italic">SM MOVIE ACADEMY</h1>
            <div id="google-btn-container" class="flex justify-center mb-8"></div>
            <button onclick="bypassLogin()" class="text-[10px] text-gray-600 font-bold tracking-widest underline hover:text-white transition uppercase">Access as Guest Consultant</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen flex flex-col relative">
        <header class="sticky top-0 z-40 bg-black/80 backdrop-blur-xl border-b border-white/10">
            <div class="max-w-[1600px] mx-auto px-10 h-24 flex items-center justify-between">
                <h1 class="text-2xl font-serif font-black text-white tracking-widest uppercase italic">SM Movie Academy</h1>
                <div class="flex items-center gap-6">
                    <div id="tmdb-auth-section" class="flex items-center gap-4 bg-white/5 border border-white/10 px-6 py-2.5 rounded-2xl">
                        <i class="fa-solid fa-key text-gold text-sm"></i>
                        <input type="text" id="header-tmdb-key" placeholder="INPUT TMDB API KEY" class="bg-transparent border-none text-white text-[11px] font-black outline-none w-56 placeholder-gray-700 tracking-tighter">
                        <button onclick="connectTMDB()" class="text-[11px] font-black text-black bg-gold px-5 py-2 rounded-xl hover:bg-yellow-500 transition">CONNECT DB</button>
                    </div>
                    <button onclick="location.reload()" class="px-6 py-3 rounded-2xl border border-white/10 text-xs font-black hover:bg-white hover:text-black transition uppercase tracking-widest">Logout</button>
                </div>
            </div>
        </header>

        <main class="flex-grow max-w-[1600px] mx-auto w-full px-10 py-16">
            <div class="mb-16">
                <h2 class="text-6xl font-serif font-black mb-6 tracking-tighter">전략적 진단 <span class="text-gray-800 italic font-medium text-5xl">통합 분석</span></h2>
                <div class="bg-card border border-white/5 p-8 rounded-[32px] flex flex-col gap-6 shadow-2xl consulting-shadow">
                    <div class="flex gap-6 border-b border-white/5 pb-4" id="search-type-tabs">
                        <button onclick="changeSearchType('movie')" id="tab-movie" class="px-6 py-2 text-sm font-black border-b-[3px] border-gold text-white uppercase tracking-[0.2em]">Movies</button>
                        <button onclick="changeSearchType('tv')" id="tab-tv" class="px-6 py-2 text-sm font-black border-b-[3px] border-transparent text-gray-700 hover:text-white uppercase tracking-[0.2em]">TV Programs</button>
                        <button onclick="changeSearchType('person')" id="tab-person" class="px-6 py-2 text-sm font-black border-b-[3px] border-transparent text-gray-700 hover:text-white uppercase tracking-[0.2em]">Crew/People</button>
                    </div>
                    <div class="flex flex-col xl:flex-row gap-4 items-center">
                        <div class="flex-1 relative w-full group">
                            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-700 text-lg"></i>
                            <input type="text" id="search-query" placeholder="분석할 작품 또는 인물명 검색 (Search)..." class="w-full bg-black border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-white text-base font-bold">
                        </div>
                        <select id="filter-year" class="w-full xl:w-56 bg-black border border-white/5 rounded-2xl py-4 px-6 text-white text-sm font-black tracking-widest">
                            <option value="">전체 연도</option>
                            <script>for(let y=2026; y>=1950; y--) document.write(`<option value="${y}">${y}년</option>`);</script>
                        </select>
                        <button onclick="searchEngineTrigger()" class="w-full xl:w-auto bg-white text-black px-12 py-4 rounded-2xl font-black text-sm uppercase tracking-tighter">진단 실행 (Run)</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10 mb-28">
                <div class="bg-[#050805] border border-green-900/30 rounded-[40px] p-10 flex flex-col shadow-2xl"><h3 class="text-green-500 font-bold mb-4 uppercase text-xs">안전 (SAFE)</h3><div id="grid-safe" class="grid grid-cols-2 gap-4"></div></div>
                <div class="bg-[#080705] border border-yellow-900/30 rounded-[40px] p-10 flex flex-col shadow-2xl"><h3 class="text-yellow-500 font-bold mb-4 uppercase text-xs">주의 (CAUTION)</h3><div id="grid-caution" class="grid grid-cols-2 gap-4"></div></div>
                <div class="bg-[#080505] border border-red-900/30 rounded-[40px] p-10 flex flex-col shadow-2xl"><h3 class="text-red-500 font-bold mb-4 uppercase text-xs">위험 (DANGER)</h3><div id="grid-danger" class="grid grid-cols-2 gap-4"></div></div>
            </div>

            <div id="history-list" class="bg-[#080808] border border-white/5 rounded-[56px] p-16 shadow-2xl">
                <h3 class="text-3xl font-black tracking-[0.1em] text-gray-100 uppercase mb-10">실시간 진단 피드</h3>
            </div>
        </main>

        <div id="detail-backdrop" onclick="closeDetailPanel()" class="fixed inset-0 bg-black/80 z-40 hidden cursor-pointer"></div>
        <div id="detail-panel" class="fixed top-0 right-0 h-full w-full max-w-2xl bg-[#080808] z-50 p-16 transform translate-x-full overflow-y-auto">
            <button onclick="closeDetailPanel()" class="text-white text-4xl mb-10"><i class="fa-solid fa-xmark"></i></button>
            <div id="panel-body"></div>
        </div>
    </div>

    <script>
        let currentSearchType = 'movie';
        let currentPage = 1;
        const TMDB_BASE_URL = "https://api.themoviedb.org/3";
        const IMG_BASE_URL = "https://image.tmdb.org/t/p/w500";
        
        function bypassLogin() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-screen').classList.remove('hidden'); }
        function closeDetailPanel() { document.getElementById('detail-panel').classList.add('translate-x-full'); document.getElementById('detail-backdrop').classList.add('hidden'); }
        function connectTMDB() { localStorage.setItem('saved_tmdb_key', document.getElementById('header-tmdb-key').value.trim()); alert('연결 완료'); }
        
        async function searchEngineTrigger() {
            const apiKey = localStorage.getItem('saved_tmdb_key');
            if(!apiKey) { alert('API 키가 연결되지 않았습니다.'); return; }
            const query = document.getElementById('search-query').value;
            const url = `${TMDB_BASE_URL}/search/${currentSearchType}?api_key=${apiKey}&language=ko-KR&query=${encodeURIComponent(query)}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                console.log(data);
                alert("진단 엔진 작동 중...");
            } catch(e) { alert("통신 오류"); }
        }
    </script>
</body>
</html>
