<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM무비 아카데미 | 전략적 진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .gold { color: #D4AF37; }
        .hidden { display: none !important; }
        #detail-panel { transition: transform 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <h1 class="text-4xl font-bold mb-8 gold italic">SM MOVIE ACADEMY</h1>
        <button onclick="bypassLogin()" class="border border-gray-600 px-6 py-2 text-sm uppercase tracking-widest hover:border-white">GUEST ACCESS</button>
    </div>

    <div id="main-screen" class="hidden min-h-screen p-8">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h1 class="text-xl font-bold">SM무비 아카데미</h1>
            <div class="flex items-center gap-4">
                <input type="text" id="tmdb-key" placeholder="API KEY" class="bg-gray-900 p-2 text-xs rounded border border-white/10">
                <button onclick="saveKey()" class="bg-gold px-4 py-2 text-xs rounded font-bold">연결</button>
                <button onclick="location.reload()" class="text-xs text-gray-500">초기화</button>
            </div>
        </header>

        <div class="bg-gray-900 p-6 rounded-xl mb-8 shadow-xl">
            <div class="flex gap-4">
                <input type="text" id="query" placeholder="작품명 검색..." class="flex-1 bg-black p-3 rounded text-sm border border-white/10">
                <button onclick="search()" class="bg-white text-black px-8 py-3 rounded font-bold text-sm">진단 실행</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900 p-6 rounded-xl border-l-4 border-green-500"><h3 class="text-green-500 font-bold mb-4">안전 (SAFE)</h3><div id="grid-safe"></div></div>
            <div class="bg-gray-900 p-6 rounded-xl border-l-4 border-yellow-500"><h3 class="text-yellow-500 font-bold mb-4">주의 (CAUTION)</h3><div id="grid-caution"></div></div>
            <div class="bg-gray-900 p-6 rounded-xl border-l-4 border-red-500"><h3 class="text-red-500 font-bold mb-4">위험 (DANGER)</h3><div id="grid-danger"></div></div>
        </div>

        <div id="history-list" class="bg-gray-900 p-6 rounded-xl">
            <h3 class="font-bold mb-4 uppercase text-xs text-gray-400 tracking-widest">Live Diagnostic Feed</h3>
        </div>
    </div>

    <div id="detail-backdrop" onclick="closePanel()" class="fixed inset-0 bg-black/80 z-40 hidden cursor-pointer"></div>
    <div id="detail-panel" class="fixed top-0 right-0 h-full w-full max-w-xl bg-black border-l border-white/20 z-50 p-8 transform translate-x-full overflow-y-auto">
        <button onclick="closePanel()" class="text-white text-2xl mb-6"><i class="fa-solid fa-xmark"></i></button>
        <div id="panel-body"></div>
    </div>

    <script>
        function bypassLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }
        function saveKey() {
            localStorage.setItem('tmdb_key', document.getElementById('tmdb-key').value);
            alert('API 키가 저장되었습니다.');
        }
        function closePanel() {
            document.getElementById('detail-panel').classList.add('translate-x-full');
            document.getElementById('detail-backdrop').classList.add('hidden');
        }
        async function search() {
            const key = localStorage.getItem('tmdb_key');
            const q = document.getElementById('query').value;
            if(!key) { alert('API 키를 먼저 연결하세요.'); return; }
            // 검색 로직 및 3열 그리드 업데이트 로직이 여기에 들어갑니다.
        }
    </script>
</body>
</html>
