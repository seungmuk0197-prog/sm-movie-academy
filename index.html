<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM무비 아카데미 | 전략적 진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <h1 class="text-4xl font-bold mb-8 text-gold italic">SM MOVIE ACADEMY</h1>
        <button onclick="startApp()" class="border border-gray-600 px-6 py-2 text-sm uppercase tracking-widest hover:border-white">GUEST ACCESS</button>
    </div>

    <div id="main-screen" class="hidden min-h-screen p-8">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-xl font-bold">SM무비 아카데미</h1>
            <div class="flex gap-4">
                <input type="text" id="tmdb-key" placeholder="TMDB API 키" class="bg-gray-900 p-2 text-xs rounded">
                <button onclick="saveKey()" class="bg-gold px-4 py-2 text-xs rounded font-bold">연결</button>
            </div>
        </header>

        <div class="bg-gray-900 p-6 rounded-2xl mb-10">
            <input type="text" id="query" placeholder="작품 검색..." class="w-full bg-black p-4 rounded mb-4">
            <button onclick="search()" class="bg-white text-black px-6 py-2 rounded font-bold">진단 실행</button>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // 1. 시작 버튼 누르면 화면 전환
        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        // 2. 키 저장
        function saveKey() {
            const key = document.getElementById('tmdb-key').value;
            localStorage.setItem('tmdb_key', key);
            alert('키가 저장되었습니다.');
        }

        // 3. 검색 기능
        async function search() {
            const key = localStorage.getItem('tmdb_key');
            const query = document.getElementById('query').value;
            if(!key) { alert('API 키를 먼저 연결하세요.'); return; }
            
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${key}&language=ko-KR&query=${encodeURIComponent(query)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const container = document.getElementById('results');
                container.innerHTML = '';
                
                data.results.forEach(m => {
                    container.innerHTML += `<div class="bg-gray-800 p-4 rounded">${m.title}</div>`;
                });
            } catch(e) {
                alert('검색 실패: API 키를 확인하세요.');
            }
        }
    </script>
</body>
</html>
