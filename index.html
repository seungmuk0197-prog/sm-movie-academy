<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM무비 아카데미 | 전략적 저작권 진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700;900&family=Nanum+Myeongjo:wght@700;800&family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#000000', gold: '#D4AF37', card: '#111111', safe: '#22C55E', caution: '#EAB308', danger: '#EF4444' },
                    fontFamily: { serif: ['"Nanum Myeongjo"', 'serif'], sans: ['Pretendard', 'Urbanist', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #daffde; font-family: 'Pretendard', sans-serif; margin: 0; line-height: 1.4; overflow-x: hidden; }
        .gold-gradient-text { background: linear-gradient(135deg, #fff 0%, #D4AF37 50%, #aa841b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(255,255,255,0.05); }
        .movie-card:hover { transform: translateY(-10px); border-color: #D4AF37; box-shadow: 0 20px 40px rgba(0,0,0,1); }
        .page-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; background: #111; color: #666; border: 1px solid #222; }
        .page-btn.active { background: #D4AF37; color: #000; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        #detail-panel { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        #detail-backdrop { transition: opacity 0.4s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        .subscriber-tag { color: #D4AF37; font-weight: 900; font-size: 14px; letter-spacing: -0.02em; }
        .action-button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #ddd; transition: all 0.2s; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
        .action-button:hover { background: #EF4444; border-color: #EF4444; color: #fff; transform: scale(1.05); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-black">
        <div class="relative z-10 w-full max-w-xl p-16 bg-black border border-white/10 rounded-[40px] shadow-2xl text-center">
            <h1 class="text-6xl font-serif font-black leading-tight mb-10 gold-gradient-text italic">Red Carpet Entry</h1>
            <div id="google-btn-container" class="flex justify-center mb-8"></div>
            <button onclick="bypassLogin()" class="text-[10px] text-gray-600 font-bold tracking-widest underline hover:text-white transition uppercase">Guest Access</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen flex flex-col relative">
        <header class="sticky top-0 z-40 bg-black/80 backdrop-blur-xl border-b border-white/10">
            <div class="max-w-[1600px] mx-auto px-10 h-20 flex items-center justify-between">
                <h1 class="text-xl font-serif font-black text-white tracking-widest uppercase italic">SM MOVIE ACADEMY</h1>
                <div class="flex items-center gap-6">
                    <div id="tmdb-auth-section" class="flex items-center gap-3 bg-white/5 border border-white/10 px-4 py-2 rounded-xl">
                        <input type="text" id="header-tmdb-key" placeholder="API KEY" class="bg-transparent text-white text-[10px] font-black outline-none w-32 placeholder-gray-700">
                        <button onclick="connectTMDB()" class="text-[10px] font-black text-black bg-gold px-4 py-1.5 rounded-lg">CONNECT</button>
                    </div>
                    <button onclick="location.reload()" class="px-4 py-2 rounded-xl border border-white/10 text-xs font-black">LOGOUT</button>
                </div>
            </div>
        </header>

        <main class="flex-grow max-w-[1600px] mx-auto w-full px-10 py-10">
            <div class="bg-card border border-white/5 p-8 rounded-[32px] shadow-2xl mb-12">
                <div class="flex flex-col xl:flex-row gap-6 items-center">
                    <input type="text" id="search-query" placeholder="분석할 작품 또는 인물 검색..." class="flex-1 w-full bg-black border border-white/10 rounded-2xl py-4 px-6 text-white text-sm font-bold shadow-inner">
                    <select id="filter-year" class="w-full xl:w-48 bg-black border border-white/10 rounded-2xl py-4 px-6 text-white text-xs font-black shadow-inner">
                        <option value="">전체 연도</option>
                        <script>for(let y=2026; y>=1950; y--) document.write(`<option value="${y}">${y}년</option>`);</script>
                    </select>
                    <button onclick="searchEngineTrigger()" class="w-full xl:w-auto bg-white text-black px-10 py-4 rounded-2xl font-black text-sm hover:bg-gold">진단 실행</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
                <div id="grid-safe" class="bg-[#050805] border border-green-900/30 rounded-[32px] p-8 min-h-[200px]"></div>
                <div id="grid-caution" class="bg-[#080705] border border-yellow-900/30 rounded-[32px] p-8 min-h-[200px]"></div>
                <div id="grid-danger" class="bg-[#080505] border border-red-900/30 rounded-[32px] p-8 min-h-[200px]"></div>
            </div>

            <div id="history-list" class="flex flex-col gap-2 min-h-[300px]"></div>
        </main>
    </div>

    <div id="detail-backdrop" onclick="closeDetailPanel()" class="fixed inset-0 bg-black/80 z-40 hidden backdrop-blur-md"></div>
    <div id="detail-panel" class="fixed top-0 right-0 h-full w-full max-w-xl bg-[#080808] z-50 p-10 transform translate-x-full overflow-y-auto">
        <button onclick="closeDetailPanel()" class="absolute top-10 right-10 text-white text-3xl"><i class="fa-solid fa-xmark"></i></button>
        <div id="panel-body" class="flex flex-col gap-6"></div>
    </div>

    <script>
        // 상단 스크립트 엔진 내 calculateSafetyStatus, generateReferenceChannels, 
        // openDetailPanel, renderHistory 함수 등을 포함하여 전체 구동 로직 유지
        // (이전 응답의 로직을 그대로 사용)
    </script>
</body>
</html>
